<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Écluse Arzal-Camoël</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .widget {
      width: 100%;
      max-width: 400px;
      background: #1e293b;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .header {
      background: linear-gradient(135deg, #1d4ed8, #1e40af);
      padding: 14px 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: white;
      letter-spacing: 0.3px;
    }

    .header .date {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      margin-top: 3px;
    }

    .table-wrap { width: 100%; }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead tr {
      background: #0f172a;
    }

    th {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      padding: 8px 12px;
      text-align: center;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-bottom: 1px solid #334155;
    }

    td {
      font-size: 15px;
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #1e293b;
      color: #e2e8f0;
    }

    tbody tr { background: #1e293b; transition: background 0.2s; }
    tbody tr:last-child td { border-bottom: none; }

    tbody tr.current {
      background: #172554;
    }
    tbody tr.current td {
      color: #93c5fd;
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      background: #1d4ed8;
      color: #bfdbfe;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      margin-left: 5px;
      vertical-align: middle;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .sens {
      font-size: 10px;
      color: #64748b;
      display: block;
      margin-top: 2px;
    }

    .empty {
      text-align: center;
      padding: 28px 16px;
      color: #475569;
      font-size: 14px;
    }

    .footer {
      background: #0f172a;
      padding: 8px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #334155;
    }

    .update-info {
      font-size: 11px;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }
    .dot.loading { background: #f59e0b; }
    .dot.error   { background: #ef4444; }

    .refresh-btn {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .refresh-btn:active { opacity: 0.7; }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid #334155;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      text-align: center;
      padding: 20px;
      color: #f87171;
      font-size: 13px;
    }
    .error-msg small {
      display: block;
      margin-top: 6px;
      color: #64748b;
      font-size: 11px;
    }
  </style>
</head>
<body>

<div class="widget">
  <div class="header">
    <h1>⚓ Écluse Arzal-Camoël</h1>
    <div class="date" id="dateLabel">—</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:28%">Heure</th>
          <th style="width:32%">Bateaux</th>
          <th style="width:40%">Fin estimée</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="3" style="text-align:center;padding:20px;color:#64748b">
          <span class="spinner"></span>
        </td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer">
    <div class="update-info">
      <span class="dot" id="dot"></span>
      <span id="updateLabel">Chargement...</span>
    </div>
    <button class="refresh-btn" onclick="loadData()">
      ↻ Rafraîchir
    </button>
  </div>
</div>

<script>
  // ── Calcul de la durée estimée ──────────────────────────────────────
  // 0 bateau  → pas d'écluse
  // 1-3 bateaux → 10 min fixe (fermeture route + manœuvre incompressible)
  // 4+ bateaux  → 10 min + (nb - 3) × 3 min
  function calcDuree(nb) {
    if (nb <= 0) return 0;
    if (nb <= 3) return 10;
    return 10 + (nb - 3) * 3;
  }

  function estFin(heure, nb) {
    if (nb <= 0) return '—';
    const duree = calcDuree(nb);
    const d = new Date();
    d.setHours(heure, duree, 0, 0);
    return d.toTimeString().slice(0, 5);
  }

  // ── Parsing du HTML de la page écluse ──────────────────────────────
  function parseHTML(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const rows = doc.querySelectorAll('table tr');
    const result = [];

    rows.forEach(row => {
      const cells = row.querySelectorAll('td');
      if (cells.length >= 4) {
        const label = cells[0].textContent.trim();
        const match = label.match(/^(\d+)h/);
        if (!match) return;
        const heure = parseInt(match[1]);

        // La colonne "Montante" contient du texte de formulaire parasite,
        // on extrait uniquement le premier entier trouvé
        const montanteRaw = cells[2].textContent.match(/^\s*(\d+)/);
        const avalanteRaw = cells[3].textContent.match(/^\s*(\d+)/);

        result.push({
          label,
          heure,
          montante: montanteRaw ? parseInt(montanteRaw[1]) : 0,
          avalante: avalanteRaw ? parseInt(avalanteRaw[1]) : 0,
        });
      }
    });
    return result;
  }

  // ── Rendu du tableau ────────────────────────────────────────────────
  function render(data) {
    const nowH = new Date().getHours();
    const upcoming = data.filter(r => r.heure >= nowH).slice(0, 3);
    const tbody = document.getElementById('tbody');

    if (upcoming.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">Aucun passage prévu ce soir.<br>Bonne nuit ⚓</td></tr>';
      return;
    }

    tbody.innerHTML = upcoming.map(r => {
      const nb = r.montante + r.avalante;
      const isCurrent = r.heure === nowH;
      const cls = isCurrent ? 'current' : '';
      const badge = isCurrent ? '<span class="badge">En cours</span>' : '';
      const fin = estFin(r.heure, nb);
      const sens = nb > 0 ? `<span class="sens">${r.montante}↑ &nbsp;${r.avalante}↓</span>` : '';
      return `<tr class="${cls}">
        <td>${r.label}${badge}</td>
        <td>${nb}${sens}</td>
        <td>${fin}</td>
      </tr>`;
    }).join('');
  }

  // ── Chargement des données ──────────────────────────────────────────
  async function loadData() {
    const dot = document.getElementById('dot');
    const lbl = document.getElementById('updateLabel');
    const tbody = document.getElementById('tbody');

    dot.className = 'dot loading';
    lbl.textContent = 'Chargement...';
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:#64748b"><span class="spinner"></span></td></tr>';

    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('dateLabel').textContent =
      new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

    const url = `https://www.passeportecluse-arzal-camoel.com/?date=${today}`;

    // On essaie plusieurs proxies CORS publics en cascade
    const proxies = [
      `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
      `https://corsproxy.io/?${encodeURIComponent(url)}`,
    ];

    let html = null;
    for (const proxy of proxies) {
      try {
        const resp = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
        if (!resp.ok) continue;
        const json = await resp.json();
        html = json.contents || json;
        if (typeof html === 'string' && html.length > 1000) break;
      } catch (_) { continue; }
    }

    if (!html) {
      tbody.innerHTML = `<tr><td colspan="3" class="error-msg">
        Impossible de charger les données.
        <small>Vérifie ta connexion internet.</small>
      </td></tr>`;
      dot.className = 'dot error';
      lbl.textContent = 'Erreur';
      return;
    }

    const data = parseHTML(html);

    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">Aucune donnée pour aujourd\'hui.</td></tr>';
    } else {
      render(data);
    }

    const now = new Date();
    lbl.textContent = `Màj ${now.toTimeString().slice(0, 5)}`;
    dot.className = 'dot';
  }

  // ── Lancement ───────────────────────────────────────────────────────
  loadData();
  setInterval(loadData, 30 * 60 * 1000); // rafraîchit toutes les 30 min
</script>
</body>
</html>
